<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새 상품 등록 - Product Management</title>
    <style>
        body { font-family: 'Malgun Gothic', Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; color: #333; }
        h1 { border-bottom: 2px solid #4a90d9; padding-bottom: 10px; color: #2c3e50; }
        .back-btn { display: inline-block; padding: 8px 16px; background: #6c757d; color: white; text-decoration: none; border-radius: 4px; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; color: #495057; }
        input[type="text"], input[type="number"], textarea, select {
            width: 100%; padding: 10px 12px; border: 1px solid #ced4da;
            border-radius: 4px; font-size: 1em; box-sizing: border-box;
            font-family: inherit;
        }
        input:focus, textarea:focus, select:focus {
            outline: none; border-color: #4a90d9; box-shadow: 0 0 0 3px rgba(74,144,217,0.15);
        }
        /* 검증 오류 스타일 */
        .field-error { border-color: #e74c3c !important; }
        .error-msg { color: #e74c3c; font-size: 0.85em; margin-top: 5px; display: block; }
        textarea { height: 120px; resize: vertical; }
        .btn-submit { background: #4a90d9; color: white; border: none; padding: 12px 32px; font-size: 1em; border-radius: 4px; cursor: pointer; }
        .btn-submit:hover { background: #357abd; }
        .hint { font-size: 0.85em; color: #6c757d; margin-top: 4px; }
        .required { color: #e74c3c; }
    </style>
</head>
<body>

    <h1>새 상품 등록</h1>

    <a class="back-btn" th:href="@{/products}">← 목록으로 돌아가기</a>

    <!--
        th:action: 폼의 action 속성을 Thymeleaf가 처리합니다.
        th:object="${productForm}": Controller에서 model.addAttribute("productForm", ...)으로
                   전달한 ProductForm 객체와 폼 필드를 연결합니다.

        [Bean Validation 검증 오류 표시 흐름]
        1. 사용자가 폼 제출 (POST /products/create)
        2. @Valid에 의해 ProductForm의 어노테이션 검증 실행
        3. 오류 발생 → bindingResult에 FieldError 저장
        4. 컨트롤러: bindingResult.hasErrors() → return "productForm"
        5. Spring MVC가 productForm 객체(오류 포함)를 Model에 자동 포함
        6. Thymeleaf 렌더링:
           - th:classappend로 오류 필드에 빨간 테두리 적용
           - th:errors로 오류 메시지 텍스트 표시
    -->
    <form th:action="@{/products/create}" th:object="${productForm}" method="post">

        <div class="form-group">
            <label for="name">
                상품명 <span class="required">*</span>
            </label>
            <!--
                th:field="*{name}":
                  - id="name", name="name", value="${productForm.name}" 자동 생성

                th:classappend="${#fields.hasErrors('name')} ? 'field-error'":
                  - #fields: Thymeleaf가 제공하는 검증 유틸리티 객체
                  - hasErrors('name'): 'name' 필드에 검증 오류가 있으면 true
                  - 오류 시 "field-error" 클래스 추가 → 빨간 테두리 표시
            -->
            <input type="text"
                   th:field="*{name}"
                   th:classappend="${#fields.hasErrors('name')} ? 'field-error'"
                   placeholder="상품명을 입력하세요" />
            <!--
                th:errors="*{name}":
                  - 'name' 필드의 검증 오류 메시지를 표시합니다.
                  - @NotBlank 어노테이션의 message 속성 값이 여기 표시됩니다.
                  - 오류가 없으면 이 요소 자체가 렌더링되지 않습니다.
            -->
            <span class="error-msg"
                  th:if="${#fields.hasErrors('name')}"
                  th:errors="*{name}">이름 오류 메시지</span>
        </div>

        <div class="form-group">
            <label for="category">카테고리</label>
            <!--
                select 태그에도 th:field 사용 가능
                option의 value와 productForm.category가 일치하면 selected 자동 처리
            -->
            <select th:field="*{category}">
                <option value="">-- 카테고리 선택 --</option>
                <option value="전자제품">전자제품</option>
                <option value="식품">식품</option>
                <option value="의류">의류</option>
                <option value="도서">도서</option>
                <option value="스포츠">스포츠</option>
                <option value="가구">가구</option>
                <option value="기타">기타</option>
            </select>
        </div>

        <div class="form-group">
            <label for="price">
                가격 <span class="required">*</span>
            </label>
            <input type="number"
                   th:field="*{price}"
                   th:classappend="${#fields.hasErrors('price')} ? 'field-error'"
                   placeholder="0"
                   min="0"
                   step="100" />
            <span class="error-msg"
                  th:if="${#fields.hasErrors('price')}"
                  th:errors="*{price}">가격 오류 메시지</span>
            <p class="hint">단위: 원(KRW). 100원 단위로 입력하세요.</p>
        </div>

        <div class="form-group">
            <label for="description">상품 설명</label>
            <!--
                textarea의 경우 th:field 를 사용하면 내용이 태그 사이에 자동으로 삽입됩니다.
            -->
            <textarea th:field="*{description}"
                      th:classappend="${#fields.hasErrors('description')} ? 'field-error'"
                      placeholder="상품에 대한 설명을 입력하세요..."></textarea>
            <span class="error-msg"
                  th:if="${#fields.hasErrors('description')}"
                  th:errors="*{description}">설명 오류 메시지</span>
        </div>

        <div class="form-group">
            <!--
                type="submit": 폼 데이터를 th:action에 지정된 URL로 전송합니다.
                검증 통과 시에만 서버에서 DB 저장이 이루어집니다.
            -->
            <button type="submit" class="btn-submit">상품 등록</button>
        </div>

    </form>

    <p th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss') + ' | 학번: 2171089 | 성명: 조주한'}"></p>

</body>
</html>
